<div class="page-header">
  <h1>Alumnos</h1>
  <button mat-raised-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> Nuevo alumno
  </button>
</div>

@if (loading) {
  <div class="loading-container">
    <mat-spinner></mat-spinner>
  </div>
}

@if (!loading) {
  <mat-table [dataSource]="infantes" class="mat-elevation-z2">
    <ng-container matColumnDef="nombre">
      <mat-header-cell *matHeaderCellDef>Nombre</mat-header-cell>
      <mat-cell *matCellDef="let i">{{ i.nombre }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="apellido">
      <mat-header-cell *matHeaderCellDef>Apellido</mat-header-cell>
      <mat-cell *matCellDef="let i">{{ i.apellido }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="documento">
      <mat-header-cell *matHeaderCellDef>Documento</mat-header-cell>
      <mat-cell *matCellDef="let i">{{ i.documento || '—' }}</mat-cell>
    </ng-container>

<ng-container matColumnDef="acciones">
      <mat-header-cell *matHeaderCellDef>Acciones</mat-header-cell>
      <mat-cell *matCellDef="let i">
        <button mat-icon-button (click)="openTutelas(i)" matTooltip="Ver tutelas">
          <mat-icon>family_restroom</mat-icon>
        </button>
        <button mat-icon-button color="primary" (click)="openEdit(i)" matTooltip="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="confirmDelete(i)" matTooltip="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: columns;"></mat-row>
  </mat-table>
}
