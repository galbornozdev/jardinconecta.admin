<h2 mat-dialog-title>Tutelas de {{ data.infante.nombre }} {{ data.infante.apellido }}</h2>
<mat-dialog-content>
  @if (loading) {
    <div style="text-align:center; padding: 24px;"><mat-spinner></mat-spinner></div>
  }
  @if (!loading) {
    <mat-list>
      @for (t of tutelas; track t.idUsuario) {
        <mat-list-item>
          <span matListItemTitle>{{ t.nombreUsuario }} {{ t.apellidoUsuario }}</span>
          <span matListItemLine>{{ t.tipoTutela }}</span>
          <button mat-icon-button color="warn" matListItemMeta (click)="eliminar(t)" matTooltip="Eliminar tutela">
            <mat-icon>link_off</mat-icon>
          </button>
        </mat-list-item>
      }
      @if (tutelas.length === 0) {
        <p style="color: #888; padding: 8px;">Sin tutelas registradas</p>
      }
    </mat-list>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cerrar</button>
</mat-dialog-actions>
