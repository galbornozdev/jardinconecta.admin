<h2 mat-dialog-title>Agregar educador a {{ data.sala.nombre }}</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" style="width: 100%; margin-top: 8px;">
    <mat-label>Email del educador</mat-label>
    <input matInput type="email" [(ngModel)]="email" placeholder="usuario@ejemplo.com" (keyup.enter)="agregar()" />
  </mat-form-field>
  @if (error) {
    <p style="color: #f44336; font-size: 13px; margin-top: 4px;">{{ error }}</p>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="loading || !email.trim()" (click)="agregar()">
    @if (loading) { <mat-spinner diameter="18" style="display:inline-block"></mat-spinner> }
    @if (!loading) { Agregar }
  </button>
</mat-dialog-actions>
